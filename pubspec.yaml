name: ev80_chargers
description: EV charging station finder for Germany
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  flutter_bloc: ^9.1.1
  dio: ^5.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.1
  flutter_map_marker_cluster: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^3.2.5
  json_serializable: ^6.7.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
